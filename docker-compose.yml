services:

  agendum:
    image: agendum/data:latest
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=agendum
      - MYSQL_PASSWORD=Secret1234!
    volumes:
      - data:/var/lib/agendum:rw
    ports:
      - "8800:8000"
    links:
      - mysql

  mysql:
    image: mariadb:10.5
    command: --sql-mode= --character-set-server=utf8 --collation-server=utf8_general_ci
    environment:
      - MARIADB_DATABASE=agendum
      - MARIADB_ROOT_PASSWORD=Secret1234!
    volumes:
      - mysql:/var/lib/mysql:rw

  graphql-explorer:
    image: javanile/graphql-explorer:v1
    environment:
      - GRAPHQL_ENDPOINT=http://localhost:8800/graphql
    ports:
      - "8801:5677"

volumes:
  data:
  mysql:
